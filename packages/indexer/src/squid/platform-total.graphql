query PlatformTotal {
  platformTotalTvl {
    nodes {
      mmSupplyTvlNorm
      omnipoolTvlNorm
      stablepoolsTvlNorm
      totalTvlDecoratedNorm
      xykpoolsTvlNorm
    }
  }
  platformTotalVolumesByPeriod(filter: { period: _24H_ }) {
    nodes {
      omnipoolVolNorm
      stableswapVolNorm
      totalVolNorm
      xykpoolVolNorm
    }
  }
}

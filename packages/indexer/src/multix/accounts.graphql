query MultisigsByAccountIds($accountIds: [String!]) {
  accounts(
    where: {
      AND: [
        {
          OR: [
            { id_in: $accountIds }
            { signatories_some: { signatory: { id_in: $accountIds } } }
          ]
        }
        { isMultisig_eq: true }
      ]
    }
  ) {
    id
    pubKey
    isMultisig
    isPureProxy
    threshold
    signatories {
      id
      signatory {
        id
        pubKey
      }
    }
    delegateeFor {
      id
      type
      delegator {
        id
        pubKey
        isPureProxy
      }
      delegatee {
        id
        pubKey
        isPureProxy
      }
    }
    delegatorFor {
      id
      type
      delegatee {
        id
        pubKey
        isMultisig
        threshold
        signatories {
          id
          signatory {
            id
            pubKey
          }
        }
      }
    }
  }
}

query MultisigHistoryByAccountId(
  $accountId: String!
  $limit: Int = 50
  $offset: Int = 0
) {
  multisigCalls(
    limit: $limit
    offset: $offset
    orderBy: [timestamp_DESC]
    where: { multisig: { id_eq: $accountId } }
  ) {
    id
    timestamp
    blockHash
    callIndex
    multisig {
      id
      pubKey
      isMultisig
      isPureProxy
      threshold
      signatories {
        id
        signatory {
          id
          pubKey
        }
      }
    }
  }
}

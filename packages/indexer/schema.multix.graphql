type Query {
  accountById(id: String!): Account
  accountMultisigById(id: String!): AccountMultisig
  accountMultisigs(limit: Int, offset: Int, orderBy: [AccountMultisigOrderByInput!], where: AccountMultisigWhereInput): [AccountMultisig!]!

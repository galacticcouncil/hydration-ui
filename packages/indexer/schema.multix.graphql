  accounts(limit: Int, offset: Int, orderBy: [AccountOrderByInput!], where: AccountWhereInput): [Account!]!
  accountsConnection(after: String, first: Int, orderBy: [AccountOrderByInput!]!, where: AccountWhereInput): AccountsConnection!
  multisigCallById(id: String!): MultisigCall
  multisigCalls(limit: Int, offset: Int, orderBy: [MultisigCallOrderByInput!], where: MultisigCallWhereInput): [MultisigCall!]!
  multisigCallsConnection(after: String, first: Int, orderBy: [MultisigCallOrderByInput!]!, where: MultisigCallWhereInput): MultisigCallsConnection!
  proxyAccountById(id: String!): ProxyAccount
  proxyAccounts(limit: Int, offset: Int, orderBy: [ProxyAccountOrderByInput!], where: ProxyAccountWhereInput): [ProxyAccount!]!
  proxyAccountsConnection(after: String, first: Int, orderBy: [ProxyAccountOrderByInput!]!, where: ProxyAccountWhereInput): ProxyAccountsConnection!
  squidStatus: SquidStatus
}

